name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER }}/cafofo-bring:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: [self-hosted, casaos]

    steps:
      - name: Deploy with docker compose
        run: |
          mkdir -p /opt/cafofo-bring

          cat > /opt/cafofo-bring/docker-compose.yml << 'EOF'
          services:
            cafofo-bring:
              image: ghcr.io/leandro-rocha/cafofo-bring:latest
              container_name: cafofo-bring
              restart: unless-stopped
              environment:
                - PORT=3001
                - DB_PATH=/data/shopping.db
              volumes:
                - cafofo-bring-db:/data
              ports:
                - "4001:3001"
          volumes:
            cafofo-bring-db:
          EOF

          docker compose -f /opt/cafofo-bring/docker-compose.yml pull
          docker compose -f /opt/cafofo-bring/docker-compose.yml up -d --remove-orphans
