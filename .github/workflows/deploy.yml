name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER }}/cafofo-bring:latest
          build-args: BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: [self-hosted, casaos]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        id: deploy
        if: needs.build.result == 'success'
        run: |
          docker compose -f docker-compose.casaos.yml pull
          docker compose -f docker-compose.casaos.yml up -d --remove-orphans

      - name: Notify
        if: always()
        run: |
          BUILD="${{ needs.build.result }}"
          DEPLOY="${{ steps.deploy.outcome }}"

          if [ "$BUILD" != "success" ]; then
            STATUS="❌ Build falhou"
          elif [ "$DEPLOY" = "success" ]; then
            STATUS="✅ Deploy concluído"
          else
            STATUS="⚠️ Build ok, mas o deploy falhou"
          fi

          sleep 5
          curl -s -X POST http://localhost:4001/api/notify/deploy \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.NOTIFY_TOKEN }}" \
            -d "{\"actor\": \"${{ github.actor }}\", \"branch\": \"${{ github.ref_name }}\", \"commit\": \"$(git log -1 --pretty='%s')\", \"status\": \"$STATUS\"}" || true
