name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER }}/cafofo-bring:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: [self-hosted, casaos]

    steps:
      - name: Pull & restart
        run: |
          docker pull ghcr.io/leandro-rocha/cafofo-bring:latest
          docker stop cafofo-bring || true
          docker rm cafofo-bring || true
          docker run -d \
            --name cafofo-bring \
            --restart unless-stopped \
            -e PORT=3001 \
            -e DB_PATH=/data/shopping.db \
            -v cafofo-bring-db:/data \
            -p 4001:3001 \
            ghcr.io/leandro-rocha/cafofo-bring:latest
