services:
  cafofo-bring:
    image: ghcr.io/leandro-rocha/cafofo-bring:latest
    container_name: cafofo-bring
    restart: unless-stopped
    environment:
      - PORT=3001
      - DB_PATH=/data/shopping.db
      - NOTIFY_TOKEN=${NOTIFY_TOKEN}
    volumes:
      - db-data:/data
    ports:
      - "4001:3001"

volumes:
  db-data:
