services:
  backend:
    build: ./backend
    container_name: cafofo-bring-api
    restart: unless-stopped
    environment:
      - PORT=3001
      - DB_PATH=/data/shopping.db
    volumes:
      - db-data:/data
    networks:
      - app

  frontend:
    build: ./frontend
    container_name: cafofo-bring-web
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app
    ports:
      - "3000:80"

networks:
  app:

volumes:
  db-data:
